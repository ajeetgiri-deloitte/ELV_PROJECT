{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - EPR ELV</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" type="text/css" href="{% static 'css/rvsfappcss/authentication/forgetpassword.css' %}">

</head>
<body>

  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="card">
          <div class="card-header">
            Forgot Password
          </div>
          <div class="card-body p-4">
            <p class="text-muted text-center">
              Please Enter authorized person email address and we will send you instructions to reset your password.
            </p>
            <form method="POST" action="{% url 'resetpassword' %}" id="resetForm">
              {% csrf_token %}
              <div class="mb-3">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" class="form-control" id="email" name="auth_email" placeholder="you@example.com" required>
              </div>
              <div class="d-grid">
                <button type="submit" class="btn btn-primary btn-reset">Send Credentials</button>
              </div>
            </form>
            <div class="mt-3 text-center">
              <a href="{% url 'rvsf_home' %}" class="link">Back to Login</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Loader Overlay -->
  <div id="loadingOverlay">
    <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;">
      <span class="visually-hidden">Loading...</span>
    </div>
    <p>Processing, please wait...</p>
  </div>

<!-- Load external JS -->
<script src="{% static 'js/rvsfappjs/authentication/forgetpassword.js' %}"></script>


</body>
</html>
