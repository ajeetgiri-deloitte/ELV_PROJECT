{% load static %}
{% include "layouts/header.html" %}
    
    <style>
        .login-container {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(12px);
            border-radius: 15px;
            padding: 30px;
            max-width: 380px;
            width: 100%;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            animation: fadeIn 1s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .box{
            display: flex;
            justify-content: center;
        }

        .btn-signin {
            width: 50%;

            background: linear-gradient(90deg, #ff6a00, #ee0979);
            color: #fff;
            font-weight: 400;
            padding: 8px;
            border-radius: 8px;
            transition: all 0.3s;
            border: none;
            font-size: 16px;
        }

        .btn-signin:hover {
            background: linear-gradient(90deg, #ee0979, #ff6a00);
            color: white;
        }

        .sign-in {
            display: block;
            /* margin-top: 7px; */
            border: 2px solid #fff;
            border-radius: 8px;
            padding: 7px 10px;
            color: #fff;
            text-decoration: none;
            font-size: 16px;
            transition: all 0.3s;
        }

        .sign-in:hover {
            text-decoration: underline;
            color: #ff6a00;
            border: 2px solid #ff6a00;
        }

        #refresh-captcha {
            background: #ff6a00;
            border: none;
            border-radius: 5px;
            padding: 6px 10px;
            cursor: pointer;
            font-size: 12px;
            color: #fff;
            transition: 0.3s;
        }

        #refresh-captcha:hover {
            background: #ee0979;
        }

    </style>
</head>
<body>
    <div>{% if messages %}
        {% for message in messages %}
            <div class="alert {% if message.tags %}alert-{{ message.tags }}{% endif %}">
            {{ message }}
            </div>
        {% endfor %}
    {% endif %}
    <div style="height: 80vh;" class="d-flex align-items-center justify-content-center">
    <div class="login-container">
        <h4 class="text-center mb-5 text-light"><i class="fas fa-user-lock mx-3"></i>Reset your Password</h4>
        <form method="post">
            {% csrf_token %}
            
            <div class="form-group text-light my-3">
                <label for="password" class="my-1"><i class="fas fa-user mx-1"></i> Password <span class="text-warning">*</span></label>
                <input type="password" id="password" name="password" class="form-control px-2 py-1 fst-italic" placeholder="Enter Password" required>
            </div>

            <div class="form-group text-light my-3">
                <label for="confirm_password" class="my-1"><i class="fas fa-user mx-1"></i> Confirm Password <span class="text-warning">*</span></label>
                <input type="password" id="confirm_password" name="confirm_password" class="form-control px-2 py-1 fst-italic" placeholder="Enter Confirm Password" required>
            </div>


            <div class="form-group text-light mt-4 mb-3 captcha-container">
                <div id="captcha-container">
                    {{ form.captcha }}
                </div>
                <button type="button" id="refresh-captcha" class="mt-2">
                    <i class="fas fa-sync-alt"></i>
                </button>
            </div>
            <div class="box mt-4">
                <button type="submit" class="btn btn-signin">Reset</button>
            </div>
        </form>
    </div>
</div>
</div>
    <script>
        document.getElementById('refresh-captcha').addEventListener('click', function() {
            fetch("{% url 'refresh_captcha' %}")
                .then(response => response.json())
                .then(data => {
                    document.getElementById('captcha-container').innerHTML = data.captcha_html;
                })
                .catch(error => console.error('Error refreshing captcha:', error));
        });
    </script>
    <script>
        setTimeout(function() {
            let alerts = document.querySelectorAll('.alert');
            alerts.forEach(function(alert) {
                alert.style.transition = "opacity 0.5s ease-out";
                alert.style.opacity = "0";
                setTimeout(() => alert.remove(), 500); // Remove from DOM after fade-out
            });
        }, 5000); // Disappears after 5 seconds (adjust time if needed)
    </script>

{% include "layouts/footer.html" %}
