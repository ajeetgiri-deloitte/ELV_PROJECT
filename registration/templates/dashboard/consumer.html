    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const userTypeSelect = document.getElementById("userType");

            // Load the selected user type from sessionStorage and set it
            const selectedType = sessionStorage.getItem("userType");

            if (window.location.pathname === "/dashboard/") {
                // Reset the dropdown if on the dashboard URL
                sessionStorage.removeItem("userType");
                userTypeSelect.value = "";
            } else if (selectedType) {
                userTypeSelect.value = selectedType; // Retain the selected value on other pages
            }

            userTypeSelect.addEventListener("change", function () {
                const selectedOption = userTypeSelect.options[userTypeSelect.selectedIndex].value;
                sessionStorage.setItem("userType", selectedOption); // Save selection in sessionStorage
                if (selectedOption) {
                    window.location.href = selectedOption; // Redirect to the selected page
                }
            });
        });
    </script>

    <script>
        // Function to handle facility details dynamically
    function addFacility() {
        let type = document.getElementById('type').value;
        let fuelType = document.getElementById('fuel_type').value;
        let vehicleNo = document.getElementById('vehicle_no').value;
        let totalVehicle = document.getElementById('total_vehicle').value;

        if (type && fuelType && vehicleNo && totalVehicle) {
            let table = document.getElementById('facilityRows');
            let rowCount = table.rows.length;
            let row = table.insertRow(rowCount);

            row.insertCell(0).innerText = rowCount + 1;
            row.insertCell(1).innerText = type;
            row.insertCell(2).innerText = fuelType;
            row.insertCell(3).innerText = vehicleNo;
            row.insertCell(4).innerText = totalVehicle;
            row.insertCell(5).innerHTML = `<button class="btn btn-danger btn-sm" onclick="removeFacility(this)">Remove</button>`;
            
            // Clear the form inputs
            document.getElementById('facilityForm').reset();
            document.getElementById('facilityModal').modal('hide');
        } else {
            alert("Please fill in all fields.");
        }
    }

    // Function to remove facility details row
    function removeFacility(button) {
        let row = button.closest("tr");
        row.remove();
    }

    // Function to toggle facility details display based on vehicle type selection
    function toggleFacilityDetails(show) {
        let facilityDetails = document.getElementById("facilityDetails");
        let facilityTable = document.getElementById("facilityTable");
        
        if (show) {
            facilityDetails.style.display = "block";
            facilityTable.style.display = "table";
        } else {
