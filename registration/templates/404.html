{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - 404</title>
    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .error-container {
            text-align: center;
            padding: 40px;
        }
        .error-code {
            font-size: 120px;
            font-weight: 700;
            color: #0d6efd;
        }
        .error-message {
            font-size: 24px;
            margin-bottom: 20px;
            color: #6c757d;
        }
        .btn-home {
            padding: 10px 25px;
            font-size: 18px;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code">404</div>
        <div class="error-message">Oops! The page you are looking for doesn’t exist.</div>
        <!-- <a href="{% url 'home' %}" class="btn btn-primary btn-home">Go Back Home</a> -->
         <a href="{{ home_url }}" class="btn btn-primary btn-home">Go Back</a>
    </div>
</body>
</html>
