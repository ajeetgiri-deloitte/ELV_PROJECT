{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OTP Verification - Producer</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" type="text/css" href="{% static 'css/rvsfappcss/authentication/otpverify.css' %}">
</head>
<body>
  <div class="otp-card text-center">
    <h4 class="mb-3">OTP Verification</h4>
    <p class="text-muted">Enter the 6-digit code sent to your registered email/mobile</p>

{% if messages %}
  {% for msg in messages %}
    <div class="alert alert-{{ msg.tags }}">{{ msg }}</div>
  {% endfor %}
{% endif %}


    <form method="POST" action="{% url 'verify_otp1' %}">
      {% csrf_token %}
      <input type="hidden" name="username" value="{{ username }}">
      <input type="hidden" name="password" value="{{ password }}">
      
      <div class="mb-3">
        <label for="otp" class="form-label">Enter OTP</label>
        <input type="text" id="otp" name="otp" class="form-control text-center" maxlength="6" autofocus>
      </div>
      
      <!-- Captcha -->
      <div class="mb-3">
        <div class="me-3" id="captchaContainer"> 
            {{ form.captcha }} 
        </div> 
        <button type="button" id="refreshCaptcha" class="btn btn-outline-secondary mt-2"> ↻ Refresh Captcha</button> 
      </div>

      <button type="submit" class="btn btn-primary w-100 mt-3">Verify</button>
    </form>

    <div class="mt-3">
      <small class="text-muted">Didn’t receive the code?</small><br>
      <button type="button" id="resendOtpBtn" class="btn btn-warning mt-2">Resend OTP</button>
      <a href="{% url 'home' %}" onclick="localStorage.setItem('selectedLoginType', '/')" class="btn btn-secondary mt-2">Go Back</a>
    </div>
  </div>



<script src="{% static 'js/rvsfappjs/authentication/otpverify.js' %}"></script>

<script>

    document.getElementById('refreshCaptcha').addEventListener('click', function() {
        
        fetch("{% url 'refresh_captcha' %}")
            .then(response => response.json())
            .then(data => {
                // alert(data.captcha_html);
                document.getElementById('captchaContainer').innerHTML = data.captcha_html;
            })
            .catch(error => console.error('Error refreshing captcha:', error));
    });
</script>

<script>
document.getElementById("resendOtpBtn").addEventListener("click", function () {
    let formData = new FormData();
    formData.append("username", "{{ username }}");
    formData.append("password", "{{ password }}");
    formData.append("csrfmiddlewaretoken", "{{ csrf_token }}");

    fetch("{% url 'resend_otp1' %}", {
        method: "POST",
        body: formData
    })
    .then(res => res.json())
    .then(data => {
        if (data.status === "success") {
            alert(data.message);
            startResendTimer();  // optional timer lock
        } else {
            alert(data.message);
        }
    })
    .catch(error => console.error("Error:", error));
});

// Optional: prevent spamming
function startResendTimer() {
    let btn = document.getElementById("resendOtpBtn");
    let seconds = 30;
    btn.disabled = true;

    let interval = setInterval(() => {
        btn.innerText = `Resend OTP (${seconds}s)`;
        seconds--;
        if (seconds < 0) {
            clearInterval(interval);
            btn.innerText = "Resend OTP";
            btn.disabled = false;
        }
    }, 1000);
}
</script>

<!-- AES Encryption Script -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
<script>
document.addEventListener("DOMContentLoaded", function() {
    const key = CryptoJS.enc.Utf8.parse("16charSecretKey!");
    const iv = CryptoJS.enc.Utf8.parse("16charSecretIV!!");

    const form = document.querySelector("form[action$='verify_otp1']");
    if (!form) return;

    // Create hidden input for encrypted OTP
    const hiddenOtp = document.createElement("input");
    hiddenOtp.type = "hidden";
    hiddenOtp.name = "enc_otp";
    form.appendChild(hiddenOtp);

    form.addEventListener("submit", function(e) {
        const otpField = document.getElementById("otp");
        const otpValue = otpField.value.trim();

        if (otpValue.length !== 6) {
            alert("Please enter a valid 6-digit OTP.");
            e.preventDefault();
            return;
        }

        // Encrypt OTP
        const encrypted = CryptoJS.AES.encrypt(otpValue, key, {
            iv: iv,
            padding: CryptoJS.pad.Pkcs7
        }).toString();

        // Put encrypted OTP in hidden field
        hiddenOtp.value = encrypted;

        // Clear original OTP field so its maxlength doesn’t reject the form
        otpField.value = "";
    });
});
</script>



</body>
</html>
