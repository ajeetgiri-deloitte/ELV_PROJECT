  <link rel="stylesheet" type="text/css" href="{% static 'css/spcbapp/auth/login.css' %}">

<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="logo-group">
      <!-- Government of India Emblem -->
      <img src="https://cpcb.nic.in/images/site-logo.jpg" alt="India Emblem" class="logo-img">
    </div>

    <div class="navbar-center">
        <img src="https://cpcb.nic.in/images/golden_jubilee_logo.png" alt="CPCB Logo" class="logo-img" />
        <h1>End of Life Vehicle EPR Portal</h1>
      
    </div>

    <div class="logo-group">
      <!-- MoEF&CC Logo -->
      <img src="https://moef.gov.in/storage/configuration-images/1734422674.1707280802.moef-logo-right.png" alt="MoEF&CC Logo" class="logo-img">
    </div>
  </nav>
  

  <!-- Login Form Section -->
  <div class="container">
    <div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1100;">
      {% if messages %}
          {% for message in messages %}
              <div class="toast align-items-center text-white 
                          {% if message.tags == 'success' %}bg-success
                          {% elif message.tags == 'error' %}bg-danger
                          {% elif message.tags == 'warning' %}bg-warning text-dark
                          {% else %}bg-info{% endif %}
                          border-0 mb-2" role="alert" aria-live="assertive" aria-atomic="true" data-bs-delay="5000">
                  <div class="d-flex">
                      <div class="toast-body">
                          {{ message }}
                      </div>
                      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
                  </div>
              </div>
          {% endfor %}
      {% endif %}
  </div>
  
  
    <div class="login-container">
      <h2>SPCB Login</h2>

      <form  action="{% url 'spcb_home' %}" method="POST">

        {% csrf_token %}
        <div class="form-group">
          <label for="email">Username</label>
          <input type="text" id="email" name="username" placeholder="example@domain.com" required />
          <div class="error" id="emailError"></div>
        </div>

        <div class="form-group password-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter your password" required />
          <i class="fa fa-eye toggle-password" id="togglePassword"></i>
          <div class="error" id="passwordError"></div>
        </div>
        <div class="row">
          <div class="col-md-4 mb-3">
              
              <div class="d-flex align-items-center">
                  <div id="captcha-container" class="me-2">{{ captcha_form }}</div>
                  <button type="button" id="refresh_captcha" class="btn btn-outline-secondary btn-sm">
                      <i class="fas fa-sync-alt"></i>
                  </button>
              </div>
              {% for error in  captcha_form.captcha.errors %}
                  <div class="invalid-feedback d-block">{{ error }}</div>
              {% endfor %}
          </div>
      </div>

        <button type="submit" class="login-btn">Login</button>
      </form>

      <div class="bottom-buttons">
        <button onclick="window.location.href='{% url 'rvsf_home' %}'" class="nav-btn">RVSF</button>
        <button onclick="window.location.href='{% url 'login' %}'" class="nav-btn">Producer</button>
        <button onclick="window.location.href='{% url 'custom_admin_login' %}'" class="nav-btn">CPCB</button>
      </div>
    </div>
  </div>

 
<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</script>

</body>
