
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Payment Status</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f5f7fa;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #333;
    }
    .container {
      background: #fff;
      padding: 30px 40px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      max-width: 400px;
      text-align: center;
      width: 90%;
    }
    h2 {
      margin-bottom: 20px;
      font-size: 28px;
      color: {% if status == "success" %} #28a745 {% else %} #dc3545 {% endif %};
    }
    p {
      font-size: 18px;
      margin: 12px 0;
    }
    .order-id {
      font-weight: 600;
      color: #555;
    }
    .message {
      margin: 20px 0;
      font-size: 20px;
      font-weight: 500;
    }
    .btn {
      display: inline-block;
      padding: 12px 28px;
      background: {% if status == "success" %} #28a745 {% else %} #dc3545 {% endif %};
      color: white;
      text-decoration: none;
      border-radius: 6px;
      font-weight: 600;
      transition: background 0.3s ease;
    }
    .btn:hover {
      background: {% if status == "success" %} #218838 {% else %} #c82333 {% endif %};
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Payment {{ status|title }}</h2>
    <p class="order-id">Order ID: <strong>{{ order_id }}</strong></p>

    {% if status == "success" %}
      <p class="message">Thank you! Your payment was successful.</p>
    {% else %}
      <p class="message">Sorry, your payment did not go through.</p>
    {% endif %}

    <a href="/dashboard/producer/" class="btn">Back to Dashboard</a>
  </div>
</body>
</html>
