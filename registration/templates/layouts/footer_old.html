{% load static %}
<style>
    .row1.bg-dark {
    margin: 0px;
}
</style>
<!-- Fonts and icons -->
<script src="{% static 'js/plugin/webfont/webfont.min.js' %}"></script>
<script>
    WebFont.load({
        google: { families: ["Public Sans:300,400,500,600,700"] },
        custom: {
        families: [
            "Font Awesome 5 Solid",
            "Font Awesome 5 Regular",
            "Font Awesome 5 Brands",
            "simple-line-icons",
        ],
        urls: ["{% static 'css/fonts.min.css' %}", "https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"],
        },
        active: function () {
        sessionStorage.fonts = true;
        },
    });
</script>

<div>
    <div class="row1 bg-dark">
        <p class="w-100 pl-3 mb-0 large" style="color: #FFFFFF; padding: 13px 10px; text-align: center;">
            Website designed, developed & hosted by : IT Division, Central Pollution Control Board.
        </p>
    </div>
</div>
